type_key: gates_tpp_device
org: gates
source_type: tpp
intervention_class: device
display_name: "Medical Device Target Product Profile"
chunker_config_path: "../chunker/configs/gates_tpp_device.yaml"

sections:
  - name: "Instructions for Use"
    description: "Guidance on completing the template, including Minimum vs. Optimistic framing and annotation conventions."
    weight: 0.05

  - name: "Medical Need / Differentiation Strategy / Use Case"
    description: "Medical need, intended use case scenario, and critical assumptions used to develop the TPP."
    weight: 0.20

  - name: "Annotated Product Requirements (Intervention-wide Variables)"
    description: "Main device TPP table with Variable / Minimum / Optimistic / Annotations columns. Each variable should have both Minimum and Optimistic targets with annotations citing source data or rationale."
    weight: 0.40
    variables:
      - name: "Indication"
        description: "The condition the device is intended to address. Should match regulatory language."
      - name: "Product"
        description: "Device name and mechanism of action (Candidate TPP only)."
      - name: "Target Population"
        description: "Demographic and clinical characteristics of patients. Specify age range, geography, and condition severity."
      - name: "Special Populations"
        description: "Considerations for pediatric, pregnant, immunocompromised, or elderly populations."
      - name: "Population/Segment unlikely to be treated"
        description: "Patient populations or segments unlikely to be treated, including device contraindications."
      - name: "Target Countries"
        description: "Geographic markets and tiers. Should reference WHO regions or specific country lists with rationale."
      - name: "Efficacy"
        description: "Primary efficacy endpoints and target levels. Quantitative target with rationale."
      - name: "Clinical Endpoint for Licensure"
        description: "Clinical endpoint required for regulatory approval."
      - name: "Safety"
        description: "Primary safety endpoints and target levels. Quantitative."
      - name: "Shelf Life"
        description: "Target duration of storage and required conditions. Quantitative target."
      - name: "Product Presentation"
        description: "How the product is presented. Registration and access considerations."
      - name: "Product Registration Pathway(s)"
        description: "Regulatory pathway: country focus, intended path, anticipated challenges."
      - name: "WHO Prequalification Date"
        description: "Target year/timeframe for WHO PQ."
      - name: "National Policy Recommendation Needs"
        description: "Targeted policy requirements and timeframe based on focus countries."
      - name: "Primary Target Delivery Channel"
        description: "Intended delivery channels - direct to consumer, health care facility, public/private funding."
      - name: "Target Affordable Pricing / Procurement"
        description: "Affordable price for the end user in target countries."
      - name: "COGS"
        description: "Target manufacturing cost. Quantitative target with rationale."
      - name: "Target Procurement Price"
        description: "Target wholesale procurement price (USAID, World Bank, Global Fund). Quantitative."
      - name: "Total Per Patient Costs (Delivered)"
        description: "Full cost including delivery and treatment regimen. Quantitative."
      - name: "Expected Financing Source"
        description: "Expected financing mechanism - donor, government, consumer."
      - name: "Volume estimates"
        description: "1 to 5 year demand forecast post-approval."
      - name: "Packaging"
        description: "How the product will be packaged - components and consumables together or separately."
      - name: "Shipping"
        description: "Mode of transportation, temperature and monitoring requirements."

  - name: "Additional Variables of Interest"
    description: "Device-specific variables in same min/optimistic/annotations format."
    weight: 0.25
    variables:
      - name: "Device Type"
        description: "Device type by anticipated risk to patient (e.g. class II FDA device)."
      - name: "Device Format"
        description: "Physical format of the device."
      - name: "Is companion diagnostic needed for use?"
        description: "Whether use is conditional on a companion diagnostic test."
      - name: "Ease of Operation"
        description: "Skills and training required to operate the device, appropriate for defined user groups."
      - name: "User Preference"
        description: "Design parameters addressing end user preferences (size, weight, format, left/right-handed use)."
      - name: "Tamper evidence"
        description: "Tamper-evidence indicators or barriers to entry."
      - name: "Reusability"
        description: "Components intended as consumables vs. non-consumables, single use vs. reusable."
      - name: "User Error"
        description: "Protocols ensuring proper device usage; risk of user error and detectable user-related hazards."
      - name: "Robustness"
        description: "Target durability and robustness test requirements."
      - name: "Components"
        description: "Major components and sub-components of the device."
      - name: "Environmental description"
        description: "Whether the device can be operated in low-infrastructure environments."
      - name: "Construction materials"
        description: "Materials used; safety parameters for material leachability and foreign particulate matter."
      - name: "Manufacturing Process"
        description: "Manufacturing process details."
      - name: "Development Standards"
        description: "Quality systems and documentation per regulatory guidance and standards."
      - name: "Disposal"
        description: "Disposal requirements for the device and patient samples."
      - name: "Power and IT requirements"
        description: "Power source, battery life, charging time, digital requirements."
      - name: "Size / Weight"
        description: "Size and weight relative to comparable devices."
      - name: "Device performance"
        description: "Conformance to recognized FDA consensus standards."
      - name: "Orientation"
        description: "Device performance impact due to changes in orientation."
      - name: "Shelf life: Device specific performance"
        description: "Sterilization requirements and product property retention through storage and use."
      - name: "Impurities and degradation products"
        description: "Impurities and degradation products controlled within toxicological limits."
      - name: "Foreign particulate matter"
        description: "Acceptance criteria for foreign particulate matter."
      - name: "Microbial standards"
        description: "Microbial standards applying to the treatment process."
      - name: "Biocompatibility requirements"
        description: "Biological acceptability criteria for device use (cytotoxicity, sensitization, hemocompatibility, pyrogenicity, genotoxicity, carcinogenicity, reproductive toxicity)."
      - name: "Leachables"
        description: "Target level for leachables under normal use, application, or storage conditions."

  - name: "Change Management"
    description: "Version history tracking changes between TPP versions. Should record what changed, who made the change, and when."
    weight: 0.10
