# Render Blueprint: FastAPI backend + Next.js frontend.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# After first deploy, set the two cross-URL env vars (see comments) and
# redeploy the frontend (NEXT_PUBLIC_* is baked at build time).
services:
  # ---- Backend: FastAPI gateway over all services ----
  - type: web
    name: pdis-api
    runtime: python
    plan: starter          # starter avoids free-tier spin-down (cold starts)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false        # set in dashboard (secret)
      - key: NCBI_API_KEY
        sync: false        # optional: raises PubMed rate limit; safe to leave unset
      - key: CORS_ALLOW_ORIGINS
        sync: false        # set to the frontend URL, e.g. https://pdis-web.onrender.com

  # ---- Frontend: Next.js ----
  - type: web
    name: pdis-web
    runtime: node
    plan: starter
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_PDIS_API_URL
        sync: false        # set to the backend URL, e.g. https://pdis-api.onrender.com
