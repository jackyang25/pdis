# Benchmarker extraction config template. The attribute VOCABULARY
# (names + descriptions) lives in shared/attributes.yaml.
# This file holds only how benchmarker EXTRACTS/BINDS claims to those
# shared attributes.

type_key: example_intervention
intervention_class: example_intervention
display_name: "Example Intervention"

preamble: |
  Replace this with a short description of what this benchmarker config
  covers and how the extractor/binder should approach claims for it.

# Allowed claim_type values for this config. Must be a subset of the
# canonical CLAIM_TYPES enum in services/benchmarker/models.py.
claim_types:
  - performance
  - feasibility
  - user_need
  - workflow
  - access
  - market
  - regulatory
  - modelled_impact
  - expert_judgment

# Per-attribute extraction hints, keyed by shared attribute name.
# Omit attributes that need no benchmarker-specific expected_claim_types.
attribute_extraction:
  - ref: example.performance
    expected_claim_types:
      - performance
      - modelled_impact

  - ref: example.safety
    expected_claim_types:
      - performance
      - regulatory

# Optional rules for ambiguous extraction/binding.
disambiguation: []
