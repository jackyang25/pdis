# AttributeConfig template.
#
# Evidence configs are keyed by INTERVENTION CLASS only. The attribute
# namespace describes a product class (vaccine, drug, diagnostic, device),
# not a document format. Copy this file to <intervention>.yaml (e.g.,
# diagnostic.yaml or drug.yaml) and fill in the attributes.
#
# Real configs should have 25–50 attributes covering performance, safety,
# presentation, access, regulatory, manufacturing, and economic dimensions
# appropriate to the product class.

type_key: example_intervention
intervention_class: example_intervention  # must match filename stem
display_name: "Example Intervention"

preamble: |
  Replace this with a short description of what this config covers and
  how a binder/author should approach attribute assignment for it.

# Allowed claim_type values for this config. Must be a subset of the
# canonical CLAIM_TYPES enum in evidence/models.py.
claim_types:
  - performance
  - feasibility
  - user_need
  - workflow
  - access
  - market
  - regulatory
  - modelled_impact
  - expert_judgment

# Intervention class this config is for. One value per config — write
# a separate config for each (org × source_type × intervention).
intervention_class: vaccine  # e.g., vaccine, mab, drug_oral, diagnostic_assay, device, bednet

# Allowed indication values for this config.
indications:
  - hiv
  - tb
  - malaria
  - contraception
  - maternal_health

# Attribute definitions. Each must have a name and a description.
# Optional: parent, expected_claim_types.
attributes:
  - name: example.performance.threshold
    description: >
      Replace with a real attribute description. The description is what
      a binder LLM (or a human author) uses to decide whether a claim
      belongs to this attribute.
    expected_claim_types:
      - performance
      - modelled_impact

# Optional rules for ambiguous binding (free-text guidance for the binder).
disambiguation: []
