disambiguation:
- |
  Claims about overall protection (any disease severity) belong to `vaccine.efficacy`. Claims specifically about severe disease, hospitalization, or mortality belong to `vaccine.efficacy_against_severe_disease`.
- |
  Claims about local/systemic reactions (injection-site pain, fever, transient malaise) belong to `vaccine.reactogenicity`. Claims about serious adverse events or pharmacovigilance belong to `vaccine.safety`. Claims projecting safety based on platform extrapolation belong to `vaccine.anticipated_safety_profile`.
- |
  Claims about CTC eligibility, freeze sensitivity, or out-of-cold-chain tolerance belong to `vaccine.thermostability`. Claims about shelf life at 2–8°C belong to `vaccine.shelf_life`. Claims about required cold chain footprint at country level belong to `vaccine.cold_chain_requirements`.
- |
  Claims about EPI integration, schedule fit, or operational deployment feasibility belong to `vaccine.programmatic_suitability`. Claims about which delivery channel is preferred (EPI vs. campaign vs. private) belong to `vaccine.delivery_strategy`.
- |
  Claims about cost-to-manufacture per dose belong to `vaccine.cogs`. Claims about price paid by procurers belong to `vaccine.procurement_price`. Claims about full delivered cost (cold chain + administration + wastage) belong to `vaccine.total_per_patient_cost`.
- |
  Claims about reduction in onward transmission, community-level effects, or herd protection belong to `vaccine.transmission_reduction`. Claims about individual-level protection belong to `vaccine.efficacy` (or `vaccine.efficacy_against_severe_disease`).
- |
  Claims about subgroup-specific efficacy or safety (pregnancy, immunocompromised, elderly, pediatric) belong to `vaccine.special_populations`.
