# Vaccine AttributeConfig.
#
# Keyed by intervention only — the attribute namespace describes the
# product class, not the source document format. Claims from any vaccine
# document (BMGF TPP, WHO PPC, peer-org PPC, etc.) bind to this same
# namespace. Source provenance is preserved on each claim via the header
# (org, source_type, intervention_class, indication).

type_key: vaccine
intervention_class: vaccine
display_name: "Vaccine"

preamble: |
  This config binds claims extracted from vaccine documents (BMGF TPPs,

  WHO PPCs, peer-org PPCs, papers) to attributes describing the vaccine's
  performance, safety, presentation, manufacturing, access, and regulatory
  characteristics. Each attribute is queryable across all vaccine documents
  regardless of source. Use disambiguation rules below when a claim could
  bind to multiple attributes.

# Allowed claim_type values for this config.
claim_types:
  - performance
  - feasibility
  - user_need
  - workflow
  - access
  - market
  - regulatory
  - modelled_impact

attributes:
  # --- Identity / scope ---
  - name: vaccine.indication
    description: >
      The disease or condition the vaccine is intended to prevent or treat.
      Claims about the target disease, pathogen, or clinical condition.
    expected_claim_types:
      - performance
      - regulatory

  - name: vaccine.product
    description: >
      The vaccine candidate or class — antigens, platform (mRNA, protein
      subunit, viral vector, etc.), and formulation.
    expected_claim_types:
      - feasibility
      - performance

  - name: vaccine.use_case
    description: >
      Specific product use case when a document defines more than one
      (e.g., WHO PPCs may cover blood-stage prevention vs. transmission
      reduction as separate use cases within the same document).
    expected_claim_types:
      - performance
      - user_need

  - name: vaccine.target_population
    description: >
      Demographic and clinical characteristics of intended recipients —
      age range, geography (LMIC vs. global), pregnancy status,
      comorbidities, risk factors.
    expected_claim_types:
      - user_need
      - access

  - name: vaccine.target_countries
    description: >
      Geographic markets and tiers (LMIC focus, WHO regions, Gavi-eligible
      countries, specific country lists).
    expected_claim_types:
      - access
      - market

  - name: vaccine.target_setting
    description: >
      Transmission setting or epidemiological context where the vaccine
      is intended to be used (e.g., high vs. low transmission, endemic
      vs. epidemic).
    expected_claim_types:
      - access
      - user_need

  # --- Efficacy and protection ---
  - name: vaccine.efficacy
    description: >
      Required protective efficacy against the primary clinical endpoint.
      Typically expressed as percent reduction in disease incidence over
      a defined follow-up period. Includes Minimum and Preferred /
      Optimistic target values from the source document.
    expected_claim_types:
      - performance
      - modelled_impact

  - name: vaccine.efficacy_against_severe_disease
    description: >
      Protective efficacy specifically against severe disease,
      hospitalization, or death. Often tracked separately from prevention
      of mild/moderate disease.
    expected_claim_types:
      - performance
      - modelled_impact

  - name: vaccine.duration_of_protection
    description: >
      How long protective immunity persists after immunization. Typically
      months or years. Claims about waning, booster requirements, durability.
    expected_claim_types:
      - performance
      - modelled_impact

  - name: vaccine.onset_of_immunity
    description: >
      Time from immunization (or completion of series) to protective
      immunity. Typically days or weeks.
    expected_claim_types:
      - performance

  - name: vaccine.transmission_reduction
    description: >
      Impact on transmission of the pathogen — indirect (herd) effects,
      reduction in onward infection, community-level impact.
    expected_claim_types:
      - modelled_impact
      - performance

  # --- Safety ---
  - name: vaccine.safety
    description: >
      Overall safety profile — acceptable rates of serious adverse events,
      contraindications, post-licensure pharmacovigilance expectations.
      Benchmarked against WHO / regulatory safety standards.
    expected_claim_types:
      - performance
      - regulatory

  - name: vaccine.reactogenicity
    description: >
      Local and systemic reactogenicity (injection-site reactions, fever,
      malaise). Tracked separately from serious adverse events because it
      affects acceptability and EPI integration.
    expected_claim_types:
      - performance
      - user_need

  - name: vaccine.anticipated_safety_profile
    description: >
      Expected adverse events based on platform characteristics or prior
      data from comparable products. Forward-looking projection.
    expected_claim_types:
      - modelled_impact

  # --- Presentation, dosing, route ---
  - name: vaccine.presentation
    description: >
      Vial size, doses per vial, formulation (liquid vs. lyophilized),
      primary container.
    expected_claim_types:
      - feasibility
      - workflow

  - name: vaccine.dose_volume
    description: >
      Volume per dose in mL.
    expected_claim_types:
      - feasibility

  - name: vaccine.dosing_schedule
    description: >
      Number of doses, interval between doses, timing relative to age or
      EPI schedule.
    expected_claim_types:
      - workflow
      - feasibility

  - name: vaccine.route_of_administration
    description: >
      Route (intramuscular, intradermal, subcutaneous, oral, intranasal).
    expected_claim_types:
      - workflow
      - feasibility

  # --- Thermostability and cold chain ---
  - name: vaccine.thermostability
    description: >
      Stability profile across temperature ranges. Controlled Temperature
      Chain (CTC) eligibility, out-of-cold-chain excursion tolerance,
      freeze sensitivity.
    expected_claim_types:
      - feasibility
      - access

  - name: vaccine.shelf_life
    description: >
      Shelf life at recommended storage temperatures (typically 2–8°C).
    expected_claim_types:
      - feasibility

  - name: vaccine.cold_chain_requirements
    description: >
      Cold chain storage and transport requirements — required temperature
      range, special handling, in-country cold-chain footprint.
    expected_claim_types:
      - feasibility
      - access

  # --- Compatibility ---
  - name: vaccine.coadministration
    description: >
      Compatibility with other vaccines in the routine immunization schedule
      without interference.
    expected_claim_types:
      - workflow
      - performance

  - name: vaccine.combination_potential
    description: >
      Potential for combination with other antigens into a multivalent
      product (e.g., combined with measles or DTP).
    expected_claim_types:
      - feasibility
      - workflow

  # --- Regulatory ---
  - name: vaccine.registration_path
    description: >
      Regulatory pathway — WHO Prequalification + stringent regulatory
      authority (SRA) + national authorities of high-burden countries.
    expected_claim_types:
      - regulatory

  - name: vaccine.who_prequalification_target
    description: >
      Target year/timeline for WHO Prequalification. PQ is the gateway
      to Gavi procurement.
    expected_claim_types:
      - regulatory

  - name: vaccine.clinical_endpoint
    description: >
      Primary clinical endpoint required for licensure (e.g., reduction
      in lab-confirmed disease, hospitalization, seroconversion).
    expected_claim_types:
      - regulatory
      - performance

  # --- Programmatic / access ---
  - name: vaccine.programmatic_suitability
    description: >
      Suitability for the intended deployment model — EPI integration,
      mass campaigns, outbreak response. Operational feasibility at scale.
    expected_claim_types:
      - workflow
      - access

  - name: vaccine.delivery_strategy
    description: >
      Primary delivery channel — routine EPI, supplementary campaigns,
      catch-up, outbreak response, private market.
    expected_claim_types:
      - access
      - workflow

  - name: vaccine.equity_and_access
    description: >
      Equity considerations — access pricing for LMICs, Gavi procurement
      eligibility, supply allocation, regional manufacturing.
    expected_claim_types:
      - access
      - market

  # --- Economics & manufacturing ---
  - name: vaccine.cogs
    description: >
      Cost of goods per dose at scale. Quantitative targets like
      "less than $X per dose at Y doses/year volume."
    expected_claim_types:
      - market
      - feasibility

  - name: vaccine.procurement_price
    description: >
      Target price per dose paid by procurers (Gavi, UNICEF, country
      governments). Distinct from COGS.
    expected_claim_types:
      - market
      - access

  - name: vaccine.total_per_patient_cost
    description: >
      Full cost per immunized person including delivery, cold chain,
      administration, wastage.
    expected_claim_types:
      - market
      - modelled_impact

  - name: vaccine.supply_and_manufacturing
    description: >
      Annual production capacity needed at scale, manufacturing footprint,
      tech transfer, regional diversification.
    expected_claim_types:
      - feasibility
      - market

  # --- Special populations ---
  - name: vaccine.special_populations
    description: >
      Considerations for pregnancy, immunocompromised individuals, infants,
      elderly, or other subgroups. Subgroup-specific efficacy, safety, or
      dosing adjustments.
    expected_claim_types:
      - performance
      - user_need

  - name: vaccine.regimen_compliance_risk
    description: >
      Risks to completing the dosing schedule — series drop-off, cold
      chain access at point of care, scheduling barriers.
    expected_claim_types:
      - workflow
      - access

  - name: vaccine.companion_diagnostic
    description: >
      Whether a companion test is needed (e.g., to screen recipients or
      monitor response).
    expected_claim_types:
      - workflow
      - feasibility

disambiguation:
  - >
    Claims about overall protection (any disease severity) belong to
    `vaccine.efficacy`. Claims specifically about severe disease,
    hospitalization, or mortality belong to
    `vaccine.efficacy_against_severe_disease`.
  - >
    Claims about local/systemic reactions (injection-site pain, fever,
    transient malaise) belong to `vaccine.reactogenicity`. Claims about
    serious adverse events or pharmacovigilance belong to `vaccine.safety`.
    Claims projecting safety based on platform extrapolation belong to
    `vaccine.anticipated_safety_profile`.
  - >
    Claims about CTC eligibility, freeze sensitivity, or out-of-cold-chain
    tolerance belong to `vaccine.thermostability`. Claims about shelf life
    at 2–8°C belong to `vaccine.shelf_life`. Claims about required cold
    chain footprint at country level belong to `vaccine.cold_chain_requirements`.
  - >
    Claims about EPI integration, schedule fit, or operational deployment
    feasibility belong to `vaccine.programmatic_suitability`. Claims about
    which delivery channel is preferred (EPI vs. campaign vs. private)
    belong to `vaccine.delivery_strategy`.
  - >
    Claims about cost-to-manufacture per dose belong to `vaccine.cogs`.
    Claims about price paid by procurers belong to `vaccine.procurement_price`.
    Claims about full delivered cost (cold chain + administration + wastage)
    belong to `vaccine.total_per_patient_cost`.
  - >
    Claims about reduction in onward transmission, community-level effects,
    or herd protection belong to `vaccine.transmission_reduction`. Claims
    about individual-level protection belong to `vaccine.efficacy` (or
    `vaccine.efficacy_against_severe_disease`).
  - >
    Claims about subgroup-specific efficacy or safety (pregnancy,
    immunocompromised, elderly, pediatric) belong to
    `vaccine.special_populations`.
