type_key: bmgf_itpp_vaccine
org: bmgf
source_type: itpp
intervention_class: vaccine
display_name: "Vaccine Intervention TPP"

section_taxonomy:
  - name: "Introduction"
    description: "Background on what TPPs are and how they're used. Covers key characteristics (alignment tool, quantitative language, forward-looking, dynamic), the distinction between Intervention TPPs and Candidate TPPs, and the role of TPPs in portfolio decisions."

  - name: "Instructions for Use"
    description: "Guidance on completing the template. Explains the two main sections (Executive Summary, Additional Variables), the Minimum vs. Optimistic criteria framework, conventions for quantitative criteria, version numbering rules (V1.0 major, V1.1 minor), and Change Management practices."

  - name: "Medical Need / Use Case"
    description: "The use case section, typically structured as a single-column table. Contains Problem Definition, Target User Group, Intended Use Case Scenario, Barriers (regulatory + delivery), Medical Need / differentiation strategy, and Critical Assumptions used to develop the TPP."

  - name: "Executive Summary (Core Variables)"
    description: "The main TPP table with Variable / Minimum / Optimistic / Annotations columns. Each row is a core variable: Indication, Product, Target Population, Target Countries, Efficacy, Duration of Protection, Onset of Immunity, Indirect (Herd) Protection, Safety, Co-administration, Presentation, Dosing Schedule and Route of Administration, Vaccine Volume, Stability/Shelf Life, Product Registration Path, WHO Prequalification Date, Primary Target Delivery Channel, COGS, Manufacturing Capacities."

  - name: "Additional Variables of Interest"
    description: "Secondary table in the same Variable / Minimum / Optimistic / Annotations format. Variables not relevant to every TPP: Special Populations, Anticipated Safety Profile, Regimen Compliance Risks, Companion Diagnostic, Target Procurement Price, Total Per Patient Costs, Clinical Endpoint for Licensure."

  - name: "Change Management"
    description: "Version history table tracking changes between TPP versions. Columns: Version, Key Changes from Previous Version, Change Made By. Used to document the evolution of the TPP over time."

preamble: >
  This is a Vaccine Target Product Profile (TPP). TPPs define the desired
  characteristics of a vaccine product using minimum and optimistic targets.
  They typically follow this structure: an introduction explaining what TPPs are,
  instructions for completing the template, a medical need and use case section
  (often a single-column table with problem definition, target users, barriers,
  and critical assumptions), an executive summary table with core variables
  (indication, target population, efficacy, safety, dosing, COGS, etc.) in
  minimum/optimistic/annotations columns, additional variables of interest in
  the same table format, and a change management log tracking version history.

  The executive summary and additional variables sections contain dense
  multi-column tables where each row is a separate variable. Label all rows
  within a table under the same section - do not split individual table rows
  into different sections.

disambiguation:
  - >
    Blocks about target population, efficacy, safety, dosing, presentation,
    stability, COGS, and regulatory path that appear within the main TPP table
    belong to "Executive Summary (Core Variables)", not their own sections.
  - >
    Blocks about special populations, companion diagnostics, procurement price,
    and per-patient costs belong to "Additional Variables of Interest", even if
    they overlap thematically with core variables.
  - >
    The medical need / use case section is often a single-column table in
    the document. Blocks from this table should be labeled "Medical Need / Use Case"
    even though their source_type may be "paragraph" (due to single-column
    table flattening).

include_metadata_label: true
include_other_label: true
