type_key: gates_tpp_drug
org: gates
source_type: tpp
intervention_class: drug
display_name: "Drug Target Product Profile"

section_taxonomy:
  - name: "Introduction"
    description: "Background on what TPPs are and how they're used. Covers key characteristics (alignment tool, quantitative language, forward-looking, dynamic), the distinction between Intervention TPPs and Candidate TPPs, and the role of TPPs in portfolio decisions."

  - name: "Instructions for Use"
    description: "Guidance on completing the template. Explains the two main sections (Executive Summary with Annotations, Additional Variables of Interest), the Minimum vs. Optimistic criteria framework, conventions for quantitative criteria, version numbering rules, and Change Management practices."

  - name: "Summary: Intervention Use Case"
    description: "The use case section, typically structured as a single-column table. Contains Problem Definition, Target User Group, Intended Use Case Scenario, Barriers (regulatory + delivery), Medical Need / differentiation strategy, and Critical Assumptions used to develop the TPP."

  - name: "Executive Summary (Core Variables)"
    description: "The main TPP table with Variable / Minimum / Optimistic / Annotations columns. Each row is a core variable for the drug: Indication, Product, Target Population, Target Countries, Efficacy, Safety, Formulation/Dosage/Administration, Stability, Product Presentation, Registration Path, WHO PQ Date, National Policy, Delivery Channel, Pricing, COGS."

  - name: "Additional Variables of Interest"
    description: "Secondary table in same Variable / Minimum / Optimistic / Annotations format. Variables not relevant to every drug TPP: Special Populations, DDI/unlikely-to-be-treated populations, Treatment adherence risks, Companion diagnostic, Procurement Price, Per Patient Costs, Financing Source, Clinical Endpoint for Licensure, User Benefits, User Barriers."

  - name: "Change Management"
    description: "Version history table tracking changes between TPP versions. Columns: Version, Key Changes from Previous Version, Change Made By."

preamble: >
  This is a Drug Target Product Profile (TPP). Drug TPPs define the desired
  characteristics of a pharmaceutical product using minimum and optimistic
  targets. Structure: introduction, instructions for use, summary use case
  (single-column table with problem definition, target users, barriers, and
  critical assumptions), executive summary table with core variables in
  minimum/optimistic/annotations columns, additional variables of interest
  in the same table format, and a change management log.

  The executive summary and additional variables sections contain dense
  multi-column tables where each row is a separate variable. Label all rows
  within a table under the same section - do not split individual table rows
  into different sections.

disambiguation:
  - >
    Blocks about indication, target population, efficacy, safety, dosage,
    stability, presentation, registration path, COGS, and pricing that appear
    within the main TPP table belong to "Executive Summary (Core Variables)",
    not their own sections.
  - >
    Blocks about special populations, drug-drug interactions, adherence risks,
    companion diagnostics, procurement price, per patient costs, financing,
    licensure endpoints, and user benefits/barriers belong to "Additional
    Variables of Interest", even if they overlap thematically with core variables.
  - >
    The summary intervention use case section is often a single-column table
    in the document. Blocks from this table should be labeled
    "Summary: Intervention Use Case" even though their source_type may be
    "paragraph" (due to single-column table flattening).

include_metadata_label: true
include_other_label: true
