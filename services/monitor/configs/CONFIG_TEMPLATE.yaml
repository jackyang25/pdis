# Domain-specific guidance for the per-section query extractor. Each
# section of the doc gets its own focused queries - these instructions
# apply to ALL sections.
query_extraction_guidance: |
  Generate web search queries that surface up-to-date information about
  the product profile, scoped to the specific section topic. Focus on:
  regulatory developments, clinical trial readouts, competitive products,
  and authoritative scientific publications. Each query should be specific
  enough to return targeted results - avoid generic queries.

queries_per_section: 1
