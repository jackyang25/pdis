# Domain-specific guidance for the per-section query extractor. Each
# section of the doc (Efficacy, Safety, Storage, etc.) gets its own
# focused queries - these instructions apply to ALL sections.
query_extraction_guidance: |
  Generate web search queries to surface up-to-date vaccine-relevant
  information for the indication, scoped to the specific section topic.
  Focus on:
  - Recent regulatory approvals or guidance (FDA, EMA, WHO)
  - Pivotal clinical trial readouts (Phase 2/3) in the indication
  - Competitive vaccines for the same indication
  - Safety signals, post-market surveillance updates
  - Authoritative reviews and recent meta-analyses

  Use the indication name and the section topic in queries. Prefer
  queries that target specific authorities, trial registries, or
  peer-reviewed sources.

queries_per_section: 1
