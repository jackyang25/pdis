# Domain-specific guidance for the per-variable query extractor. Each
# shared TPP attribute variable gets its own focused queries - these
# instructions apply to ALL variables.
query_extraction_guidance: |
  Generate web search queries across THREE axes for a complete global
  evidence landscape:

  1. Standard of care - current prevention and treatment options for the
     indication, their efficacy and safety numbers, regimen length, and
     number of doses. Frame queries around how a new vaccine product could
     win: higher efficacy, comparable efficacy with a better safety
     profile, or fewer doses.

  2. New scientific data - recent trial readouts, new product entrants,
     platform and manufacturing advances, and epidemiology trends that
     change how valuable a vaccine is for this indication.

  3. Global access and regulatory signals - spread queries across global
     regulators, LMIC national regulators, procurement bodies, registries,
     and literature sources. Include LMIC approval, access, financing,
     prequalification, and uptake signals where relevant.

  Use the indication name and the variable topic in queries. Prefer
  queries that target named regulators, trial registries, or
  peer-reviewed literature over generic phrasing. Spread queries across
  priority sources and configured languages rather than repeatedly naming
  the same authorities.

priority_sources:
  - FDA
  - EMA
  - WHO
  - WHO Prequalification
  - CDC
  - PubMed
  - ClinicalTrials.gov
  - SAHPRA (South Africa)
  - NMPA (China)
  - CDSCO (India)
  - BPOM (Indonesia)
  - ANVISA (Brazil)
  - Africa CDC
  - Gavi
  - company press releases (Pfizer, GSK, Moderna, Merck)

modalities:
  - mRNA
  - protein subunit
  - viral vector
  - DNA
  - live-attenuated
  - inactivated
  - virus-like particle (VLP)
  - conjugate

languages:
  - en
  - fr
  - pt
  - es
  - zh
  - id

queries_per_variable: 8
geographic_emphasis:
  - global_south
geographic_queries_per_variable: 4
counterfactual_queries_per_variable: 3
