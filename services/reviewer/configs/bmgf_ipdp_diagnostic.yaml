type_key: bmgf_ipdp_diagnostic
org: bmgf
source_type: ipdp
intervention_class: diagnostic
display_name: "Diagnostic Integrated Product Development Plan"
grading_guidance: |
  This is an INTEGRATED PRODUCT DEVELOPMENT PLAN (IPDP): a high-level plan a grantee submits at investment and updates at each stage gate. Calibrate ALL judgments to a strategic development plan - NOT to a candidate specification or a TPP. Each functional domain is intentionally a high-level summary (the template limits most to 1-2 pages), so do not treat appropriate brevity as a deficiency. What matters: the critical path is articulated end to end; key risks are identified per functional area with probability/impact ratings and credible mitigations; Go / No-Go decision criteria are explicit (by functional criterion) and tied to the data the planned activities will produce; and the research, regulatory, clinical, development, manufacturing, quality, access, and delivery strategies are present and mutually consistent (timeline <-> studies <-> risks <-> decision criteria). Diagnostics separate development, manufacturing, and quality management - expect each to be addressed. Numeric specifics ARE expected where the template asks for them (clinical performance, study sizes, costs, delivery metrics); narrative is appropriate for strategy summaries. Reward internal consistency and a coherent, feasible plan over exhaustive detail.

sections:
  - name: "Executive Summary and Objectives"
    description: "Overall product-development objectives and a summary of the integrated plan, including strategic fit."
    weight: 0.08
    variables:
      - name: "Objectives Statement"
        description: "Clear statement of the product-development objectives for the project."
      - name: "Integrated Plan Summary"
        description: "A coherent summary of the integrated development plan for the candidate."
      - name: "Strategic Fit"
        description: "How the program fits the foundation's strategy and the unmet need."

  - name: "Integrated Development Timeline"
    description: "End-to-end timeline from feasibility to regulatory approval, spanning functional domains, with milestones and stage gates."
    weight: 0.10
    variables:
      - name: "End-to-End Timeline"
        description: "A high-level timeline from feasibility through regulatory approval and WHO PQ/endorsement is present."
      - name: "Cross-Functional Activities"
        description: "Key activities across functions (research, development, clinical, regulatory, manufacturing, quality, delivery) are placed on the timeline."
      - name: "Milestones and Stage Gates"
        description: "Critical milestones, stage gates, and decision points are identified with timing."

  - name: "Decision Criteria"
    description: "Go / No-Go criteria by functional criterion for progression to the next stage gate, and the data that informs them."
    weight: 0.10
    variables:
      - name: "Go/No-Go Criteria"
        description: "Explicit Go / No-Go criteria per functional criterion (research, development, clinical, regulatory, manufacturing, quality, delivery)."
      - name: "Data Linkage"
        description: "How planned activities produce the data needed to make each decision."

  - name: "Integrated Project Risks"
    description: "High-impact risks across functional areas with probability, impact, and mitigation plans."
    weight: 0.14
    variables:
      - name: "Risk Coverage"
        description: "At least one moderate-to-high-impact risk per functional area is identified."
      - name: "Probability and Impact"
        description: "Each risk is rated for probability of occurrence and magnitude of impact."
      - name: "Mitigation Plans"
        description: "Each risk has a credible, specific mitigation plan."

  - name: "Research Output Strategy"
    description: "Key data supporting the product concept."
    weight: 0.08
    variables:
      - name: "Research Output"
        description: "Key research data supporting the product concept and intended performance."

  - name: "Regulatory Strategy"
    description: "Regulatory pathway through approval and WHO PQ/endorsement, intended countries, and regulatory communications."
    weight: 0.12
    variables:
      - name: "Regulatory Pathway"
        description: "Proposed pathway through approval and WHO PQ/endorsement, with major assumptions."
      - name: "Intended Countries"
        description: "Intended countries for introduction with authority, special considerations, timeline, and WHO PQ/endorsement applicability."
      - name: "Regulatory Communications"
        description: "History and plan for key regulatory communications, with outcomes as available."

  - name: "Clinical Development Strategy"
    description: "Strategy for clinical development of the diagnostic through WHO PQ."
    weight: 0.10
    variables:
      - name: "Clinical Strategy"
        description: "Clinical development/performance-evaluation strategy and major assumptions."

  - name: "Development Strategy"
    description: "Product development through WHO PQ and launch (assay, reagents, instrument, design)."
    weight: 0.08
    variables:
      - name: "Development Strategy"
        description: "Strategy for product development including reagents, assay/instrument development, design, and verification/validation."

  - name: "Manufacturing Strategy"
    description: "Manufacturing through WHO PQ and launch."
    weight: 0.06
    variables:
      - name: "Manufacturing Strategy"
        description: "Strategy for manufacturing, manufacturability, scalability, and transfer."

  - name: "Quality Management Strategy"
    description: "Quality Management Plan through WHO PQ and launch."
    weight: 0.04
    variables:
      - name: "Quality Management"
        description: "Quality management plan (quality system, design controls, quality reporting)."

  - name: "Global Access Strategy"
    description: "Approach to availability, accessibility, and affordability in intended markets."
    weight: 0.04
    variables:
      - name: "Access Commitment"
        description: "Approach to securing manufacturer commitment to availability, accessibility, and affordability."

  - name: "Partner Management Strategy"
    description: "Selection and management of partners involved in grant execution."
    weight: 0.03
    variables:
      - name: "Partner Approach"
        description: "Approach to selecting and managing key suppliers, CROs, CMOs, distributors, and commercial partners by function."

  - name: "Delivery Strategy"
    description: "Approach to delivering the product to the target population, with delivery metrics."
    weight: 0.03
    variables:
      - name: "Delivery Approach"
        description: "Target countries and the per-topic plan for product uptake (demand, supply chain, financing, policy, country support, M&E)."
      - name: "Delivery Metrics"
        description: "Targets for delivery metrics (countries launched, target coverage, procurement price per test, unit cost to deliver)."
