type_key: bmgf_itpp_diagnostic
org: bmgf
source_type: itpp
intervention_class: diagnostic
display_name: "Diagnostic Intervention TPP"
grading_guidance: |
  This is an INTERVENTION TPP (ITPP): an early, candidate-agnostic profile that sets targets for the intervention class before any specific candidate is chosen. Calibrate ALL judgments to intervention-stage maturity. Qualitative targets, clear directions, and ranges are appropriate and expected at this stage; candidate-specific numeric precision (exact values, named formulations, specific schedules) is NOT expected yet, so do not treat its absence as a deficiency on any dimension. Assess whether the strategic intent is clear, sound, and well-formed for an early-stage profile.

sections:
  - name: "Instructions for Use"
    description: "Guidance on completing the template, including Minimum vs. Optimistic framing and annotation conventions."
    weight: 0.05

  - name: "Medical Need / Differentiation Strategy / Use Case"
    description: "Medical need, intended use case scenario, and critical assumptions used to develop the TPP."
    weight: 0.20

  - name: "Annotated Product Requirements"
    description: "Main diagnostic TPP table with Variable / Minimum / Optimistic / Annotation columns. Each variable should have both Minimum and Optimistic targets with annotations citing source data or rationale."
    weight: 0.65
    variables:
      - name: "Intended detection target"
        description: "What the test detects - target organism or molecular component. Should specify variants, genotypes, or subtypes to be detected or avoided."
      - name: "Intended use population"
        description: "Population for which the test is intended. Should specify demographics and clinical criteria."
      - name: "Actionable result"
        description: "What the information is used for - diagnosis, screening, prognosis, monitoring, surveillance, IUO, or RUO."
      - name: "Specimen type"
        description: "Type of specimens to be tested (blood, plasma, swab, etc.)."
      - name: "Test type"
        description: "Whether the test is qualitative or quantitative."
      - name: "Platform/technology"
        description: "Type of platform or technology used (PCR, lateral flow, ELISA, etc.)."
      - name: "Clinical sensitivity"
        description: "Quantitative target for clinical sensitivity. Reference WHO benchmarks where applicable."
      - name: "Clinical specificity"
        description: "Quantitative target for clinical specificity. Reference WHO benchmarks where applicable."
      - name: "Analytical specificity / cross reactivity"
        description: "Target for analytical specificity and cross-reactivity with related organisms."
      - name: "Analytical sensitivity"
        description: "Target for limit of detection (LOD)."
      - name: "Precision and reproducibility"
        description: "Targets for precision (within-run, between-run) and reproducibility across labs/users."
      - name: "Test robustness"
        description: "Targets for interference, cross-contamination, and validity controls."
      - name: "Risk of inaccurate result"
        description: "Risk assessment for inaccurate results and assay/system features to minimize risk."
      - name: "Regulatory approvals and standards"
        description: "Regulatory approvals needed (WHO PQ, FDA QSR, ISO 13485) before commercialization in target countries."
      - name: "Promotional materials"
        description: "Permitted promotional, educational, marketing, and sales materials."
      - name: "Environment / location of use"
        description: "Where the test is performed - health care level, environmental conditions."
      - name: "Instrument and device characteristics"
        description: "Physical dimensions, modularity, weight, automation level, power and water requirements, reliability, throughput, waste management, and biosafety."
      - name: "Information and communication technology"
        description: "User interface, data input/output, security, storage, connectivity requirements, result transmission."
      - name: "Reagent and control handling"
        description: "Reagent and cartridge storage, packaging requirements."
      - name: "Sample handling"
        description: "Specimen tracking, sample types and volumes, collection and transport, sample preparation."
      - name: "Distribution, service, support, training"
        description: "Who runs the test, training and support, quality control system, instrument and supply reliability, service response time."
      - name: "Commercial launch and funding"
        description: "Launch countries, government priority alignment, funding agencies, IP/global access issues, commercial channels."
      - name: "Pricing"
        description: "Total end-user price per test, maximum cost of instrumentation."

  - name: "Change Management"
    description: "Version history tracking changes between TPP versions. Should record what changed, who made the change, and when."
    weight: 0.10
