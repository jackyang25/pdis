org: bmgf
source_type: ctpp
intervention_class: device
display_name: "BMGF Candidate TPP - Device"

# Domain-specific guidance for the per-variable query extractor. Each shared
# TPP attribute variable gets its own focused queries - these instructions
# apply to ALL variables.
query_extraction_guidance: |
  Generate web search queries across THREE axes for a complete global
  evidence landscape:

  1. Standard of care - current devices or approaches for the indication,
     their clinical performance, usability, durability, and cost. Frame
     queries around how a new device could win: better clinical outcomes,
     easier use, lower cost, or suitability for low-resource settings.

  2. New scientific data - recent device entrants, clinical and usability
     studies, engineering/materials advances, and epidemiology trends that
     change how valuable a device is for this indication.

  3. Global access and regulatory signals - spread queries across global
     regulators (including device clearance pathways), WHO technical
     specifications and prequalification, LMIC national regulators,
     procurement, registries, and literature. Include LMIC approval, access,
     and uptake signals where relevant.

  Use the indication name and the variable topic in queries. Prefer queries
  that target named regulators, technical specifications, registries, or
  peer-reviewed literature over generic phrasing. Spread queries across
  priority sources and configured languages rather than repeatedly naming the
  same authorities.

priority_sources:
  - FDA (510(k) / PMA)
  - EMA
  - WHO
  - WHO Prequalification
  - CDC
  - PubMed
  - ClinicalTrials.gov
  - SAHPRA (South Africa)
  - NMPA (China)
  - CDSCO (India)
  - BPOM (Indonesia)
  - ANVISA (Brazil)
  - Africa CDC
  - Unitaid

# Optional. Device categories vary widely by indication; refine per use case.
modalities: []

languages:
  - en
  - fr
  - pt
  - es
  - zh
  - id

queries_per_variable: 8
geographic_emphasis:
  - global_south
geographic_queries_per_variable: 4
counterfactual_queries_per_variable: 3
precedent_queries_per_variable: 3
