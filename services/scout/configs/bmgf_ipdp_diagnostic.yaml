type_key: bmgf_ipdp_diagnostic
org: bmgf
source_type: ipdp
intervention_class: diagnostic
display_name: "BMGF Integrated Product Development Plan - Diagnostic"

# IPDP units are extracted from the document (milestones, timelines, cost and
# feasibility assumptions, regulatory expectations, study designs, manufacturing
# and access plans), not read from the fixed TPP attribute vocabulary.
unit_provider: extract

# Interpretive stance injected into the drift and precedent reasoning. An IPDP's
# units are plan commitments to be pressure-tested for feasibility, not
# aspirational targets - so "no precedent" reads as risk, not intended novelty.
# The same stance serves both layers here (anchored to avoid duplication).
drift_framing: &ipdp_framing >
  This is an integrated product development plan (IPDP). Its units are PLAN
  COMMITMENTS and ASSUMPTIONS - milestones, timelines, costs, clinical
  performance study designs, and regulatory, manufacturing, and access approaches
  the team intends to execute - NOT aspirational product targets. Treat external
  evidence as a REALITY CHECK on whether each commitment is feasible and on track:
  prior programs' realized timelines, typical requirements, and field benchmarks
  are the baseline the plan must be consistent with. A milestone or approach with
  NO prior precedent is a RISK to surface (unproven feasibility), not deliberate
  innovation; strong precedent is reassuring.
precedent_framing: *ipdp_framing

query_extraction_guidance: |
  Each unit is a concrete plan assertion from a diagnostic development plan - a
  milestone with a date, a development timeline, a cost or volume projection, a
  regulatory expectation, a clinical performance study design, or a
  manufacturing/access assumption. Generate web search queries that test
  whether the assertion is realistic and has precedent:

  1. Feasibility precedent - has a comparable milestone, timeline, or approach
     actually been achieved for similar diagnostics or assay platforms? Search
     for prior programs, their realized timelines, and where they slipped.

  2. Regulatory reality - typical requirements and timelines for in vitro
     diagnostics from the named or relevant bodies (FDA, EMA/IVDR, WHO PQ and
     WHO endorsement, and LMIC national regulators) for this kind of test.

  3. Benchmarks - typical clinical performance evaluation sizes, sensitivity/
     specificity targets, manufacturing yields and cost per test, and
     procurement prices for comparable diagnostics, so the plan's numbers can be
     checked against the field.

  Use the indication name and the claim's topic in queries. Prefer queries
  targeting named regulators, trial registries, or peer-reviewed literature
  over generic phrasing. Spread queries across priority sources and configured
  languages rather than repeatedly naming the same authorities.

priority_sources:
  - FDA
  - WHO
  - WHO Prequalification
  - FIND
  - PubMed
  - ClinicalTrials.gov
  - SAHPRA (South Africa)
  - NMPA (China)
  - CDSCO (India)
  - ANVISA (Brazil)
  - Africa CDC
  - company press releases

modalities:
  - rapid diagnostic test (RDT)
  - molecular / NAAT
  - lateral flow immunoassay
  - ELISA
  - point-of-care
  - laboratory-based

languages:
  - en
  - fr
  - pt
  - es
  - zh
  - id

queries_per_variable: 8
geographic_emphasis:
  - global_south
geographic_queries_per_variable: 4
counterfactual_queries_per_variable: 3
precedent_queries_per_variable: 3
