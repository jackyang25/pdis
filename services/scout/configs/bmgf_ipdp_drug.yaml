type_key: bmgf_ipdp_drug
org: bmgf
source_type: ipdp
intervention_class: drug
display_name: "BMGF Integrated Product Development Plan - Drug"

# IPDP units are extracted from the document (milestones, timelines, cost and
# feasibility assumptions, regulatory expectations, trial designs, manufacturing
# and access plans), not read from the fixed TPP attribute vocabulary.
unit_provider: extract

# Interpretive stance injected into the drift and precedent reasoning. An IPDP's
# units are plan commitments to be pressure-tested for feasibility, not
# aspirational targets - so "no precedent" reads as risk, not intended novelty.
# The same stance serves both layers here (anchored to avoid duplication).
drift_framing: &ipdp_framing >
  This is an integrated product development plan (IPDP). Its units are PLAN
  COMMITMENTS and ASSUMPTIONS - milestones, timelines, costs, trial designs, and
  regulatory, manufacturing, and access approaches the team intends to execute -
  NOT aspirational product targets. Treat external evidence as a REALITY CHECK on
  whether each commitment is feasible and on track: prior programs' realized
  timelines, typical requirements, and field benchmarks are the baseline the plan
  must be consistent with. A milestone or approach with NO prior precedent is a
  RISK to surface (unproven feasibility), not deliberate innovation; strong
  precedent is reassuring.
precedent_framing: *ipdp_framing

query_extraction_guidance: |
  Each unit is a concrete plan assertion from a drug development plan - a
  milestone with a date, a development timeline, a cost or volume projection, a
  regulatory expectation, a clinical trial design, or a manufacturing/access
  assumption. Generate web search queries that test whether the assertion is
  realistic and has precedent:

  1. Feasibility precedent - has a comparable milestone, timeline, or approach
     actually been achieved for similar drugs or modalities? Search for prior
     programs, their realized timelines, and where they slipped.

  2. Regulatory reality - typical requirements and timelines from the named or
     relevant authorities (FDA, EMA, WHO PQ, and LMIC national regulators) for
     this kind of drug and pathway.

  3. Benchmarks - typical trial sizes and endpoints, manufacturing yields and
     cost of goods, and procurement prices for comparable drugs, so the plan's
     numbers can be checked against the field.

  Use the indication name and the claim's topic in queries. Prefer queries
  targeting named regulators, trial registries, or peer-reviewed literature
  over generic phrasing. Spread queries across priority sources and configured
  languages rather than repeatedly naming the same authorities.

priority_sources:
  - FDA
  - EMA
  - WHO
  - WHO Prequalification
  - PubMed
  - ClinicalTrials.gov
  - SAHPRA (South Africa)
  - NMPA (China)
  - CDSCO (India)
  - ANVISA (Brazil)
  - Africa CDC
  - Global Fund
  - MPP (Medicines Patent Pool)
  - company press releases

modalities:
  - small molecule
  - monoclonal antibody
  - long-acting injectable
  - fixed-dose combination
  - biologic

languages:
  - en
  - fr
  - pt
  - es
  - zh
  - id

queries_per_variable: 8
geographic_emphasis:
  - global_south
geographic_queries_per_variable: 4
counterfactual_queries_per_variable: 3
precedent_queries_per_variable: 3
