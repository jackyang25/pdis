# Domain-specific guidance for the per-variable query extractor. Each shared
# TPP attribute variable gets its own focused queries - these instructions
# apply to ALL variables.
query_extraction_guidance: |
  Generate web search queries across THREE axes for a complete global
  evidence landscape:

  1. Standard of care - current treatment regimens for the indication, their
     cure/response rates, safety, regimen length, pill burden, and resistance
     profile. Frame queries around how a new drug could win: higher efficacy,
     shorter regimen, fewer doses, better safety, or activity against
     resistant strains.

  2. New scientific data - recent trial readouts, new drug entrants, mechanism
     and formulation advances (long-acting, fixed-dose combinations), and
     resistance/epidemiology trends that change how valuable a drug is for
     this indication.

  3. Global access and regulatory signals - spread queries across global
     regulators, LMIC national regulators, procurement bodies, registries, and
     literature. Include LMIC approval, WHO Essential Medicines List, access,
     financing, prequalification, and uptake signals where relevant.

  Use the indication name and the variable topic in queries. Prefer queries
  that target named regulators, trial registries, or peer-reviewed literature
  over generic phrasing. Spread queries across priority sources and configured
  languages rather than repeatedly naming the same authorities.

priority_sources:
  - FDA
  - EMA
  - WHO
  - WHO Prequalification
  - WHO Essential Medicines List
  - CDC
  - PubMed
  - ClinicalTrials.gov
  - SAHPRA (South Africa)
  - NMPA (China)
  - CDSCO (India)
  - BPOM (Indonesia)
  - ANVISA (Brazil)
  - Africa CDC
  - Global Fund
  - Medicines Patent Pool

modalities:
  - small molecule
  - biologic
  - monoclonal antibody
  - long-acting injectable
  - fixed-dose combination

languages:
  - en
  - fr
  - pt
  - es
  - zh
  - id

queries_per_variable: 8
geographic_emphasis:
  - global_south
geographic_queries_per_variable: 4
counterfactual_queries_per_variable: 3
precedent_queries_per_variable: 3
unit_provider: vocabulary

# Interpretive stance for the drift / precedent reasoning - the TPP
# aspirational-target framing, externalized from the engine (was a default).
drift_framing: |
  You compare web-derived insights against a Target Product Profile (TPP) document for a {intervention_class} targeting {indication}.

  IMPORTANT - the document is a TPP: its specifications are ASPIRATIONAL TARGETS for a desired product, NOT claims about products that already exist. Evidence about a current or standard-of-care product is the BASELINE the target aims to improve on - it does not refute the target.
precedent_framing: |
  A TPP specifies aspirational, often first-in-class products. A target with little supporting evidence is NOT automatically weak - it may be deliberately novel. Your job is to say which.
